version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payments
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka:
    image: steeltoeoss/eureka-server
    ports:
      - "8761:8761"
    restart: always

  auth_service:
    build: ./auth_service
    restart: always
    depends_on:
      eureka:
        condition: service_started

  order_service:
    build: ./order_service
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_started

  payment_service:
    build: ./payment_service
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    restart: always
    depends_on:
      order_service:
        condition: service_started
      auth_service:
        condition: service_started
      payment_service:
        condition: service_started

volumes:
  mysql_data:
