version: '3.8'

services:

  # 🐇 RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5


  # 🗄️ MySQL
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payments
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5


  # 🔍 Eureka Service Registry
  eureka:
    image: steeltoeoss/eureka-server
    ports:
      - "8761:8761"
    restart: always


  # ⚙️ Config Service (NEW)
  config_service:
    build: ./config_service
    ports:
      - "8003:8003"
    restart: always
    depends_on:
      - eureka


  # 🔐 Auth Service
  auth_service:
    build: ./auth_service
    restart: always
    depends_on:
      config_service:
        condition: service_started
      eureka:
        condition: service_started


  # 📦 Order Service
  order_service:
    build: ./order_service
    restart: always
    depends_on:
      config_service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      eureka:
        condition: service_started


  # 💳 Payment Service
  payment_service:
    build: ./payment_service
    restart: always
    depends_on:
      config_service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started


  # 🌐 NGINX Gateway
  nginx:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - order_service
      - auth_service
      - payment_service


volumes:
  mysql_data: