events {}

http {

    # =========================
    # 🔥 RATE LIMIT CONFIG
    # =========================

    # 5 requests per minute per IP
    limit_req_zone $binary_remote_addr zone=order_limit:10m rate=5r/m;

    # Force 429 instead of 503
    limit_req_status 429;


    # =========================
    # 🔥 CACHE CONFIG
    # =========================

    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=orders_cache:10m
                     max_size=100m
                     inactive=60s
                     use_temp_path=off;


    # =========================
    # 🔹 UPSTREAMS
    # =========================

    upstream order_service {
        server order_service:8000;
    }

    upstream auth_service {
        server auth_service:8002;
    }

    upstream payment_service {
        server payment_service:8001;
    }


    server {

        listen 80;

        # =========================
        # 🔐 INTERNAL AUTH CHECK
        # =========================
        location = /auth {
            internal;

            proxy_pass http://auth_service/validate;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;
        }


        # =========================
        # 🔐 LOGIN (PUBLIC)
        # =========================
        location /login {
            proxy_pass http://auth_service/login;
        }


        # =========================
        # 🔐 CREATE ORDER (RATE LIMITED)
        # =========================
        location /order {

            auth_request /auth;

            # 🔥 RATE LIMIT APPLIED HERE
            limit_req zone=order_limit burst=2 nodelay;

            proxy_pass http://order_service/create-order;

            proxy_set_header Authorization $http_authorization;
        }


        # =========================
        # 🔐 GET ORDERS (CACHED)
        # =========================
        location /orders {

            auth_request /auth;

            proxy_pass http://payment_service/orders;

            proxy_set_header Authorization $http_authorization;

            # 🔥 ENABLE CACHE
            proxy_cache orders_cache;

            # Cache key (important!)
            proxy_cache_key "$scheme$request_method$host$request_uri";

            # Cache only GET responses
            proxy_cache_methods GET;

            # Cache duration
            proxy_cache_valid 200 30s;

            # Serve stale if backend fails
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

            # Debug header (VERY useful)
            add_header X-Cache-Status $upstream_cache_status;
        }


        # =========================
        # 🔥 CUSTOM RATE LIMIT ERROR
        # =========================
        error_page 429 = /rate_limit_exceeded;

        location = /rate_limit_exceeded {
            add_header Retry-After 60;
            return 429 "Too many requests. Only 5 orders per minute allowed.";
        }
    }
}